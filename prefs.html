<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Preferences</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body class="prefs-page">
    <div class="prefs">
      <div class="prefs-sub">Theme</div>
      <div class="theme-grid" id="theme-grid"></div>
      <div class="custom-fields hidden" id="custom-fields">
        <label class="custom-field">Background<input type="color" data-var="bg" /></label>
        <label class="custom-field">Header<input type="color" data-var="header" /></label>
        <label class="custom-field">Text<input type="color" data-var="text" /></label>
        <label class="custom-field">Accent<input type="color" data-var="accent" /></label>
      </div>

      <div class="prefs-sub prefs-sub-spaced">Layout</div>
      <div class="layout-row" id="layout-options">
        <button class="layout-opt" data-layout="compact" type="button">
          <span class="layout-name">Compact</span>
          <span class="layout-hint">Resizable columns, scroll across</span>
        </button>
        <button class="layout-opt" data-layout="fixed" type="button">
          <span class="layout-name">Fixed</span>
          <span class="layout-hint">A fixed grid of areas</span>
        </button>
        <button class="layout-opt" data-layout="tabs" type="button">
          <span class="layout-name">Tabs</span>
          <span class="layout-hint">One terminal at a time</span>
        </button>
        <button class="layout-opt" data-layout="dashboard" type="button">
          <span class="layout-name">Dashboard</span>
          <span class="layout-hint">Cards with live status</span>
        </button>
      </div>
      <div class="grid-size hidden" id="grid-size">
        <label class="custom-field">Rows
          <select id="grid-rows">
            <option value="1">1</option>
            <option value="2">2</option>
            <option value="3">3</option>
          </select>
        </label>
        <label class="custom-field">Columns
          <select id="grid-cols">
            <option value="1">1</option>
            <option value="2">2</option>
            <option value="3">3</option>
            <option value="4">4</option>
            <option value="5">5</option>
          </select>
        </label>
      </div>

      <div class="prefs-sub prefs-sub-spaced">Terminal</div>
      <label class="custom-field">Font
        <select id="font-choice">
          <option value="&quot;JetBrains Mono&quot;">JetBrains Mono</option>
          <option value="&quot;SF Mono&quot;">SF Mono</option>
          <option value="Menlo">Menlo</option>
          <option value="Monaco">Monaco</option>
          <option value="&quot;Courier New&quot;">Courier</option>
        </select>
      </label>
      <label class="custom-field">Line height
        <select id="line-height">
          <option value="1">1.0</option>
          <option value="1.1">1.1</option>
          <option value="1.2">1.2</option>
          <option value="1.3">1.3</option>
          <option value="1.4">1.4</option>
          <option value="1.5">1.5</option>
        </select>
      </label>

      <div class="prefs-sub prefs-sub-spaced">General</div>
      <label class="toggle-row">
        <span class="toggle-label">Show activity bar<small>CPU &amp; memory per terminal</small></span>
        <input type="checkbox" id="show-activity" />
      </label>
    </div>

    <script src="themes.js"></script>
    <script src="prefs.js"></script>
  </body>
</html>
