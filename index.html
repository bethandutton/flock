<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'self'; style-src 'self' 'unsafe-inline'; script-src 'self'; img-src 'self' data:"
    />
    <link rel="stylesheet" href="node_modules/@fontsource/jetbrains-mono/400.css" />
    <link rel="stylesheet" href="node_modules/@fontsource/jetbrains-mono/700.css" />
    <link rel="stylesheet" href="node_modules/@xterm/xterm/css/xterm.css" />
    <link rel="stylesheet" href="styles.css" />
    <title>Flock</title>
  </head>
  <body>
    <!-- Right-click a pen header for these -->
    <div id="ctx-menu" class="menu hidden">
      <button data-act="rename" type="button">Rename</button>
      <button data-act="pin" type="button">Pin</button>
      <button data-act="shade" type="button">Look Away</button>
      <button data-act="mute" type="button">Don't Alert Me</button>
      <button data-act="left" type="button">Move Left</button>
      <button data-act="right" type="button">Move Right</button>
      <button data-act="close" type="button">Close</button>
    </div>

    <!-- The field: every pen (terminal) grazes here, side by side.
         Pen headers sit at the very top and act as the window's titlebar. -->
    <div id="field">
      <!-- Tabs layout: the pen headers move up here to become the tabs -->
      <div id="tabbar" class="hidden"></div>
      <div id="welcome">
        <canvas id="welcome-matrix"></canvas>
        <video id="welcome-video" src="assets/welcome.mp4" autoplay loop muted playsinline></video>
        <div class="welcome-card">
          <img class="welcome-avatar" src="assets/icon.png" alt="Flock" />
          <h1>Welcome to Flock</h1>
          <p>A whole flock of terminals in one window. Line them up, name them, and always know which one needs you.</p>
          <div class="welcome-actions">
            <button id="welcome-new" class="topbar-btn">New Terminal</button>
            <button id="welcome-open" class="topbar-btn secondary">Open Folder</button>
          </div>
        </div>
      </div>

      <!-- New-terminal button, sits after the last column -->
      <div id="add">
        <button id="add-btn" title="Add terminal">+</button>
        <div id="add-menu" class="menu hidden">
          <button id="add-new" type="button">New</button>
          <button id="add-open" type="button">Open Folder…</button>
          <div id="add-recents" class="hidden">
            <div class="menu-sep"></div>
            <div class="menu-label">Recent folders</div>
          </div>
        </div>
      </div>
    </div>

    <!-- Shown when a newer release is out on GitHub -->
    <div id="update-banner" class="hidden">
      <span id="update-text">A new version of Flock is available</span>
      <button id="update-get" type="button">Download</button>
      <button id="update-dismiss" type="button" title="Dismiss">✕</button>
    </div>

    <script src="node_modules/@xterm/xterm/lib/xterm.js"></script>
    <script src="node_modules/@xterm/addon-fit/lib/addon-fit.js"></script>
    <script src="node_modules/@xterm/addon-webgl/lib/addon-webgl.js"></script>
    <script src="themes.js"></script>
    <script src="renderer.js"></script>
  </body>
</html>
