<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'self'; style-src 'self' 'unsafe-inline'; script-src 'self'; img-src 'self' data:"
    />
    <link rel="stylesheet" href="node_modules/@fontsource/jetbrains-mono/400.css" />
    <link rel="stylesheet" href="node_modules/@fontsource/jetbrains-mono/700.css" />
    <link rel="stylesheet" href="node_modules/@xterm/xterm/css/xterm.css" />
    <link rel="stylesheet" href="styles.css" />
    <title>Flock</title>
  </head>
  <body>
    <!-- Right-click a pen header for these -->
    <div id="ctx-menu" class="menu hidden">
      <button data-act="rename" type="button">Rename</button>
      <button data-act="left" type="button">Move Left</button>
      <button data-act="right" type="button">Move Right</button>
      <button data-act="close" type="button">Close</button>
    </div>

    <!-- The field: every pen (terminal) grazes here, side by side.
         Pen headers sit at the very top and act as the window's titlebar. -->
    <div id="field">
      <!-- Tabs layout: the pen headers move up here to become the tabs -->
      <div id="tabbar" class="hidden"></div>
      <div id="welcome">
        <canvas id="welcome-matrix"></canvas>
        <video id="welcome-video" src="assets/welcome.mp4" autoplay loop muted playsinline></video>
        <div class="welcome-card">
          <img class="welcome-avatar" src="assets/icon.png" alt="Flock" />
          <h1>Welcome to Flock</h1>
          <p>A whole flock of terminals in one window. Line them up, name them, and always know which one needs you.</p>
          <div class="welcome-actions">
            <button id="welcome-new" class="topbar-btn">New Terminal</button>
            <button id="welcome-open" class="topbar-btn secondary">Open Folder</button>
          </div>
        </div>
      </div>

      <!-- New-terminal button, sits after the last column -->
      <div id="add">
        <button id="add-btn" title="Add terminal">+</button>
        <div id="add-menu" class="menu hidden">
          <button id="add-new" type="button">New</button>
          <button id="add-open" type="button">Open Folder…</button>
        </div>
      </div>
    </div>

    <!-- Preferences: theme + layout -->
    <div id="prefs" class="prefs hidden">
      <h2>Preferences</h2>

      <div class="prefs-sub">Theme</div>
      <div class="theme-grid" id="theme-grid"></div>
      <div class="custom-fields hidden" id="custom-fields">
        <label class="custom-field">Background<input type="color" data-var="bg" /></label>
        <label class="custom-field">Header<input type="color" data-var="header" /></label>
        <label class="custom-field">Text<input type="color" data-var="text" /></label>
        <label class="custom-field">Accent<input type="color" data-var="accent" /></label>
      </div>

      <div class="prefs-sub prefs-sub-spaced">Layout</div>
      <div class="layout-row" id="layout-options">
        <button class="layout-opt" data-layout="compact" type="button">
          <span class="layout-name">Compact</span>
          <span class="layout-hint">Resizable columns, scroll across</span>
        </button>
        <button class="layout-opt" data-layout="fixed" type="button">
          <span class="layout-name">Fixed</span>
          <span class="layout-hint">A fixed grid of areas</span>
        </button>
      </div>
      <div class="grid-size hidden" id="grid-size">
        <label class="custom-field">Rows
          <select id="grid-rows">
            <option value="1">1</option>
            <option value="2">2</option>
            <option value="3">3</option>
          </select>
        </label>
        <label class="custom-field">Columns
          <select id="grid-cols">
            <option value="1">1</option>
            <option value="2">2</option>
            <option value="3">3</option>
            <option value="4">4</option>
            <option value="5">5</option>
          </select>
        </label>
      </div>

      <div class="prefs-sub prefs-sub-spaced">Terminal</div>
      <label class="custom-field">Font
        <select id="font-choice">
          <option value="&quot;JetBrains Mono&quot;">JetBrains Mono</option>
          <option value="&quot;SF Mono&quot;">SF Mono</option>
          <option value="Menlo">Menlo</option>
          <option value="Monaco">Monaco</option>
          <option value="&quot;Courier New&quot;">Courier</option>
        </select>
      </label>

      <div class="prefs-sub prefs-sub-spaced">General</div>
      <label class="toggle-row">
        <span class="toggle-label">Show activity bar<small>CPU &amp; memory per terminal</small></span>
        <input type="checkbox" id="show-activity" />
      </label>

      <div class="prefs-actions">
        <button id="prefs-done" type="button">Done</button>
      </div>
    </div>

    <!-- Shown when a newer release is out on GitHub -->
    <div id="update-banner" class="hidden">
      <span id="update-text">A new version of Flock is available</span>
      <button id="update-get" type="button">Download</button>
      <button id="update-dismiss" type="button" title="Dismiss">✕</button>
    </div>

    <script src="node_modules/@xterm/xterm/lib/xterm.js"></script>
    <script src="node_modules/@xterm/addon-fit/lib/addon-fit.js"></script>
    <script src="node_modules/@xterm/addon-webgl/lib/addon-webgl.js"></script>
    <script src="renderer.js"></script>
  </body>
</html>
